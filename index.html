<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gêneses - Comando de Ativos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a192f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bank-blue: #0a192f;
            --accent: #00f2ff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #f84b4b;
            --warning: #f59e0b;
            --reserve: #8b5cf6;
        }

        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }
        
        /* Header Mobile */
        header {
            background: var(--bank-blue); padding: 20px; border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center;
        }
        .brand h1 { font-size: 1.5rem; letter-spacing: 2px; margin: 0; color: var(--accent); }
        .brand span { font-size: 0.7rem; color: #94a3b8; opacity: 0.8; }

        /* Status Cards Roláveis */
        .stats { 
            display: flex; overflow-x: auto; gap: 12px; padding: 20px;
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .stats::-webkit-scrollbar { display: none; }
        .stat-box {
            min-width: 160px; background: var(--card); padding: 15px; border-radius: 18px;
            scroll-snap-align: center; border-bottom: 3px solid transparent;
        }
        .stat-box small { font-size: 0.6rem; color: #94a3b8; display: block; margin-bottom: 5px; }
        .stat-box h2 { font-size: 1.1rem; margin: 0; }

        /* Sistema de Abas */
        .tabs { display: flex; background: var(--card); margin: 0 20px; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 700; border-radius: 8px; cursor: pointer; }
        .tab.active { background: var(--accent); color: var(--bank-blue); }

        .content-section { padding: 20px; display: none; }
        .content-section.active { display: block; }

        /* Formulário Ajustado */
        .glass-card { background: var(--card); padding: 20px; border-radius: 20px; }
        label { font-size: 0.65rem; color: var(--accent); font-weight: 800; margin-bottom: 5px; display: block; }
        input, select { 
            width: 100%; padding: 14px; background: #334155; border: 1px solid #475569; 
            border-radius: 12px; color: white; margin-bottom: 15px; font-size: 1rem;
        }

        /* Lista de Itens Mobile */
        .item-card {
            background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 18px;
            display: flex; align-items: center; gap: 15px; position: relative;
        }
        .icon-circle { width: 45px; height: 45px; min-width: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .item-info { flex: 1; }
        .item-info strong { display: block; font-size: 0.95rem; }
        .item-info small { color: #94a3b8; font-size: 0.75rem; }
        .item-values { text-align: right; }
        .item-values span { display: block; font-weight: 800; font-size: 0.9rem; }

        /* Floating Buttons */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .fab { width: 56px; height: 56px; border-radius: 28px; background: var(--accent); color: var(--bank-blue); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,242,255,0.4); border: none; }

        #btnFantasma { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; margin-top: 10px; }
        #btnFantasma.ativo { background: var(--accent); color: var(--bank-blue); }

        .hidden { display: none; }
        .section-divider { color: var(--accent); font-size: 0.7rem; font-weight: 900; margin: 20px 0 10px 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>GÊNESES</h1>
        <span>Protocolo Fóton | Wendel C. R. Carneiro</span><br>
        <button id="btnFantasma" onclick="toggleFantasma()">
            <i id="eyeIcon" class="fa-solid fa-eye"></i> <span id="txtFantasma">PRIVACIDADE</span>
        </button>
    </div>
</header>

<div class="stats">
    <div class="stat-box" style="border-color: var(--success)"><small>RECEITAS</small><h2 id="totalReceitas">R$ 0,00</h2></div>
    <div class="stat-box" style="border-color: var(--warning)"><small>GASTOS</small><h2 id="totalGastos">R$ 0,00</h2></div>
    <div class="stat-box" style="border-color: var(--danger)"><small>DÍVIDAS</small><h2 id="totalDividas">R$ 0,00</h2></div>
    <div class="stat-box" style="border-color: var(--reserve)"><small>PATRIMÔNIO</small><h2 id="totalReserva">R$ 0,00</h2></div>
    <div class="stat-box" style="background: var(--accent); color: var(--bank-blue)"><small style="color:rgba(0,0,0,0.5)">SALDO LIVRE</small><h2 id="totalSaldo">R$ 0,00</h2></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('extrato')">EXTRATO</div>
    <div class="tab" onclick="switchTab('nova')">NOVA OPERAÇÃO</div>
</div>

<section id="sec-extrato" class="content-section active">
    <div id="tabelaCorpo"></div>
</section>

<section id="sec-nova" class="content-section">
    <div class="glass-card">
        <h3 id="formTitle" style="margin-top:0; font-size: 1rem;"><i class="fa-solid fa-circle-plus"></i> COMANDO DE ATIVO</h3>
        <input type="hidden" id="editIndex" value="">
        
        <label>CATEGORIA</label>
        <select id="tipo" onchange="atualizarSubmenu()">
            <option value="Receita">Receita</option>
            <option value="Fixo">Gasto Fixo</option>
            <option value="Variavel">Gasto Variável</option>
            <option value="Divida">Dívida / Boleto</option>
            <option value="Reserva">Patrimônio</option>
        </select>

        <label>SUBMENU</label>
        <select id="submenu" onchange="definirDescricao()"></select>

        <label>DESCRIÇÃO</label>
        <input type="text" id="desc" placeholder="Nome da operação">

        <label>VALOR TOTAL</label>
        <input type="number" id="valor" step="0.01" inputmode="decimal">

        <div id="campoPago" class="hidden">
            <label>VALOR PAGO (ATÉ AGORA)</label>
            <input type="number" id="pago" value="0" step="0.01" inputmode="decimal">
        </div>

        <label>DATA</label>
        <input type="date" id="data">

        <button class="btn-main" onclick="salvar()" style="background:var(--accent); color:var(--bank-blue); border:none; border-radius:12px; width:100%; padding:15px; font-weight:800;">CONFIRMAR REGISTRO</button>
    </div>
</section>

<div class="fab-container">
    <button class="fab" onclick="gerarPDF()"><i class="fa-solid fa-file-pdf"></i></button>
</div>

<script>
    let registros = JSON.parse(localStorage.getItem('foton_db')) || [];
    let modoFantasma = false;

    const opcoesSubmenu = {
        "Receita": ["💰 Salário", "🚀 Freelance", "📈 Venda Ativos", "🏦 Rendimentos", "✨ Outros"],
        "Fixo": ["🏠 Aluguel", "⚡ Energia", "💧 Água", "🌐 Internet", "🎬 Streamings", "🎓 Educação", "⚙️ Outros"],
        "Variavel": ["🛒 Mercado", "🍕 Alimentação", "⛽ Combustível", "🚗 Transporte", "💊 Farmácia", "🛍️ Compras"],
        "Divida": ["💳 Cartão Crédito", "🤝 Empréstimo", "📄 Parcelamento", "🧾 Boleto", "⚠️ Outros"],
        "Reserva": ["₿ Cripto", "📊 Investimentos", "📦 Reserva Emerg.", "🛡️ Proteção", "💎 Meta"]
    };

    function switchTab(aba) {
        document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
        if(aba === 'extrato') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('sec-extrato').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('sec-nova').classList.add('active');
        }
    }

    function atualizarSubmenu() {
        const tipo = document.getElementById('tipo').value;
        const sub = document.getElementById('submenu');
        sub.innerHTML = '';
        opcoesSubmenu[tipo].forEach(opt => { sub.innerHTML += `<option value="${opt}">${opt}</option>`; });
        document.getElementById('campoPago').classList.toggle('hidden', tipo === 'Receita' || tipo === 'Reserva');
        definirDescricao();
    }

    function definirDescricao() {
        const subValue = document.getElementById('submenu').value;
        document.getElementById('desc').value = subValue.split(' ').slice(1).join(' ');
    }

    function toggleFantasma() {
        modoFantasma = !modoFantasma;
        document.getElementById('btnFantasma').classList.toggle('ativo');
        document.getElementById('eyeIcon').className = modoFantasma ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        document.getElementById('txtFantasma').innerText = modoFantasma ? "FANTASMA ON" : "PRIVACIDADE";
        renderizar();
    }

    function ocultarBits(valor) {
        if (modoFantasma) return "R$ •••••";
        return "R$ " + valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function salvar() {
        const tipo = document.getElementById('tipo').value, desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value) || 0, data = document.getElementById('data').value;
        let pago = parseFloat(document.getElementById('pago').value) || 0;
        const editIndex = document.getElementById('editIndex').value;
        
        if(tipo === 'Receita' || tipo === 'Reserva') pago = valor;
        if(!desc || valor <= 0 || !data) return alert("⚠️ Preencha os dados!");

        const obj = { tipo, desc, valor, pago, data };
        if(editIndex === "") registros.push(obj);
        else { registros[editIndex] = obj; document.getElementById('editIndex').value = ""; }
        
        localStorage.setItem('foton_db', JSON.stringify(registros));
        resetForm(); renderizar(); switchTab('extrato');
    }

    function resetForm() {
        document.getElementById('desc').value = ''; document.getElementById('valor').value = '';
        document.getElementById('pago').value = '0'; document.getElementById('data').value = '';
        document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-circle-plus"></i> COMANDO DE ATIVO';
        atualizarSubmenu();
    }

    function renderizar() {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = '';
        let sRec = 0, sGas = 0, sDiv = 0, sRes = 0;

        const ordenados = [...registros].sort((a, b) => new Date(b.data) - new Date(a.data));
        const categorias = ["Receita", "Fixo", "Variavel", "Divida", "Reserva"];

        categorias.forEach(cat => {
            const itens = ordenados.filter(r => r.tipo === cat);
            if(itens.length > 0) {
                corpo.innerHTML += `<div class="section-divider">${cat}</div>`;
                itens.forEach(r => {
                    const i = registros.indexOf(r);
                    const vTotal = parseFloat(r.valor), vPago = parseFloat(r.pago), falta = vTotal - vPago;
                    let icon = 'fa-receipt', color = '#3b82f6', bClass = 'bg-fix';
                    
                    if(r.tipo === 'Receita') { sRec += vTotal; icon='fa-arrow-up'; color='#10b981'; } 
                    else if(r.tipo === 'Divida') { sDiv += falta; icon='fa-barcode'; color='#f84b4b'; } 
                    else if(r.tipo === 'Reserva') { sRes += vTotal; icon='fa-vault'; color='#8b5cf6'; } 
                    else { sGas += vTotal; icon='fa-arrow-down'; color='#f59e0b'; }

                    corpo.innerHTML += `
                        <div class="item-card" onclick="editar(${i})">
                            <div class="icon-circle" style="background:rgba(255,255,255,0.05); color:${color}"><i class="fa-solid ${icon}"></i></div>
                            <div class="item-info">
                                <strong>${r.desc}</strong>
                                <small>${r.data.split('-').reverse().join('/')}</small>
                            </div>
                            <div class="item-values">
                                <span style="color:${vPago >= vTotal ? 'var(--success)' : 'white'}">${ocultarBits(vTotal)}</span>
                                <small style="font-size:0.6rem; color:#94a3b8">${vPago >= vTotal ? 'LIQUIDADO' : 'FALTA ' + ocultarBits(falta)}</small>
                            </div>
                        </div>`;
                });
            }
        });

        document.getElementById('totalReceitas').innerText = ocultarBits(sRec);
        document.getElementById('totalGastos').innerText = ocultarBits(sGas);
        document.getElementById('totalDividas').innerText = ocultarBits(sDiv);
        document.getElementById('totalReserva').innerText = ocultarBits(sRes);
        document.getElementById('totalSaldo').innerText = ocultarBits(sRec - (sGas + sDiv));
    }

    function editar(idx) {
        const r = registros[idx];
        switchTab('nova');
        document.getElementById('tipo').value = r.tipo;
        atualizarSubmenu();
        document.getElementById('desc').value = r.desc;
        document.getElementById('valor').value = r.valor;
        document.getElementById('pago').value = r.pago;
        document.getElementById('data').value = r.data;
        document.getElementById('editIndex').value = idx;
        document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen"></i> EDITAR REGISTRO';
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        html2canvas(document.body).then(canvas => {
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            pdf.save("Gêneses_Extrato.pdf");
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('Fóton SW On'));
    }

    window.onload = () => { atualizarSubmenu(); renderizar(); };
</script>
</body>
</html>
