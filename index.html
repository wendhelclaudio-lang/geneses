<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuCaixa - Comando de Ativos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a192f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase JS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        /* VARIÁVEIS DE TEMAS */
        :root { --bg:#030712; --card:#111827; --accent:#00f2ff; --text:#f3f4f6; --text-muted:#94a3b8; --border:#1f2937; --input-bg:#1f2937; --hover-bg:rgba(255,255,255,0.05); --success:#10b981; --danger:#ef4444; --warning:#f59e0b; --reserve:#8b5cf6;}
        [data-theme="light"] { --bg:#f8fafc; --card:#ffffff; --accent:#0284c7; --text:#0f172a; --text-muted:#64748b; --border:#e2e8f0; --input-bg:#f1f5f9; --hover-bg:rgba(0,0,0,0.05); --success:#059669; --danger:#dc2626; --warning:#d97706; --reserve:#7c3aed;}
        [data-theme="nubank"] { --bg:#f0f1f5; --card:#ffffff; --accent:#820ad1; --text:#111111; --text-muted:#757575; --border:#e0e0e0; --input-bg:#f5f5f5; --hover-bg:rgba(130,10,209,0.05); --success:#00a868; --danger:#e92929; --warning:#ff9800; --reserve:#820ad1; }
        [data-theme="itau"] { --bg:#f0f1f3; --card:#ffffff; --accent:#ec7000; --text:#002959; --text-muted:#6c7a89; --border:#dcdde1; --input-bg:#f5f6f8; --hover-bg:rgba(236,112,0,0.05); --success:#008f39; --danger:#da291c; --warning:#ec7000; --reserve:#002959; }
        [data-theme="bradesco"] { --bg:#ffffff; --card:#f9f9f9; --accent:#cc092f; --text:#333333; --text-muted:#777777; --border:#e6e6e6; --input-bg:#ffffff; --hover-bg:rgba(204,9,47,0.05); --success:#008000; --danger:#cc092f; --warning:#f2a900; --reserve:#444444; }

        * { box-sizing: border-box; outline: none; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { font-family: 'Ubuntu', system-ui, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; overflow-x:hidden; font-size:0.95rem; }
        /* ... restante do CSS permanece igual ... */
        /* (Tela de login, header, sidebar, balance card, mini-cards, modal, etc.) */
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="lock-screen">
        <i class="fa-solid fa-coins login-logo"></i>
        <h2 class="lock-title">MeuCaixa</h2>
        <p class="lock-subtitle">Gerencie suas finanças com inteligência.</p>
        
        <button class="btn-google" onclick="iniciarLoginGoogle()" id="btnGoogleAuth">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar com Google
        </button>
        
        <button class="btn-guest" onclick="continuarSemLogin()">
            Continuar sem login
        </button>
    </div>

    <header>
        <!-- Header e perfil -->
    </header>

    <div class="sidebar" id="profileSidebar">
        <!-- Sidebar menu -->
    </div>

    <div class="month-selector">
        <button onclick="mudarMes(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="mesDisplay">Mês Ano</span>
        <button onclick="mudarMes(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="balance-card">
        <small style="color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Saldo Disponível</small>
        <h1 id="totalSaldo">R$ 0,00</h1>
    </div>

    <div class="quick-stats">
        <div class="mini-card" onclick="filtrarExtrato('Receita')"><i class="fa-solid fa-arrow-up" style="color:var(--success)"></i><span>Entradas</span><strong id="totalReceitas">R$ 0,00</strong></div>
        <div class="mini-card" onclick="filtrarExtrato('Gasto')"><i class="fa-solid fa-arrow-down" style="color:var(--warning)"></i><span>Gastos</span><strong id="totalGastos">R$ 0,00</strong></div>
    </div>

    <main id="tabelaCorpo"></main>

    <button class="fab" onclick="openModal()"><i class="fa-solid fa-plus"></i></button>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="modal" id="modalForm">
        <h2 id="modalTitle">Nova Operação</h2>
        <select id="tipo">
            <option value="Receita">Receita</option>
            <option value="Fixo">Gasto Fixo</option>
            <option value="Variavel">Gasto Variável</option>
        </select>
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="valor" placeholder="0,00" step="0.01">
        <input type="date" id="data">
        <input type="hidden" id="editIndex">
        <button class="btn-confirm" onclick="salvar()">SALVAR OPERAÇÃO</button>
        <button id="btnExcluir" class="btn-delete hidden" onclick="excluirRegistro()">EXCLUIR</button>
    </div>

    <script>
        // 🔹 CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD2TXAC0o5t8vTsH2jzLqZ9QoReHU5y0Mo",
            authDomain: "meucaixa-d8d24.firebaseapp.com",
            projectId: "meucaixa-d8d24",
            storageBucket: "meucaixa-d8d24.firebasestorage.app",
            messagingSenderId: "486750418195",
            appId: "1:486750418195:web:4c33081663486abda796e6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 🔹 VARIÁVEIS GLOBAIS
        let registros = JSON.parse(localStorage.getItem('meucaixa_db')) || [];
        let modoFantasma = false, dataVisualizacao = new Date();

        let savedConfig = JSON.parse(localStorage.getItem('meucaixa_config')) || {};
        let appConfig = {
            nome: savedConfig.nome || "WENDEL CARNEIRO",
            moeda: savedConfig.moeda || "R$",
            fotoPerfil: savedConfig.fotoPerfil || null
        };

        // 🔹 FUNÇÃO TOAST
        function showToast(message, type="success"){
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type==='success'?'<i class="fa-solid fa-check-circle" style="color: var(--success)"></i>':'<i class="fa-solid fa-triangle-exclamation" style="color: var(--danger)"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(()=>{toast.style.opacity='0'; setTimeout(()=>toast.remove(),300)},3000);
        }

        // 🔹 LOGIN GOOGLE & GUEST
        auth.onAuthStateChanged((user)=>{
            if(user){
                appConfig.nome = user.displayName;
                appConfig.fotoPerfil = user.photoURL;
                document.getElementById('statusConexao').innerText = "GOOGLE CLOUD";
                document.getElementById('statusConexao').style.color = "#0ea5e9";
                salvarConfig();
                document.getElementById('lock-screen').style.opacity='0';
                setTimeout(()=>{document.getElementById('lock-screen').classList.add('hidden');},500);
            } else {
                if(sessionStorage.getItem('guestMode')==='true'){
                    document.getElementById('statusConexao').innerText = "OFFLINE LOCAL";
                    document.getElementById('lock-screen').classList.add('hidden');
                } else {
                    document.getElementById('lock-screen').classList.remove('hidden');
                    document.getElementById('lock-screen').style.opacity='1';
                }
            }
        });

        function iniciarLoginGoogle(){
            auth.signInWithPopup(provider).then(result=>{
                showToast(`Bem-vindo, ${result.user.displayName.split(" ")[0]}!`,"success");
            }).catch(err=>{
                showToast("Erro ao conectar com Google","error");
                console.error(err);
            });
        }

        function continuarSemLogin(){
            sessionStorage.setItem('guestMode','true');
            document.getElementById('statusConexao').innerText = "OFFLINE LOCAL";
            document.getElementById('lock-screen').style.opacity='0';
            setTimeout(()=>{document.getElementById('lock-screen').classList.add('hidden');},500);
            showToast("Entrou no Modo Offline","success");
            renderizar();
        }

        function fazerLogout(){
            auth.signOut().then(()=>{
                sessionStorage.removeItem('guestMode');
                closeAll();
                location.reload();
            });
        }

        // 🔹 FUNÇÃO SALVAR OPERAÇÃO
        function salvar(){
            const t = document.getElementById('tipo').value,
                  d = document.getElementById('desc').value,
                  v = document.getElementById('valor').value,
                  dt = document.getElementById('data').value,
                  idx = document.getElementById('editIndex').value;
            if(!d || !v || !dt) return showToast("Preencha todos os campos!","error");
            const novo = { tipo:t, desc:d, valor:v, data:dt };
            if(idx!=="") registros[idx]=novo; else registros.push(novo);
            localStorage.setItem('meucaixa_db', JSON.stringify(registros));
            closeAll();
            renderizar();
            showToast("Operação Salva!");
        }

        // 🔹 FUNÇÃO RENDERIZAR
        function renderizar(){
            // Carrega dados de configuração
            document.getElementById('headerUserName').innerText = appConfig.nome;
            document.getElementById('sidebarUserName').innerText = appConfig.nome;
            let avatares=[document.getElementById('headerAvatar'),document.getElementById('sidebarAvatar')];
            let iniciais=appConfig.nome.substring(0,2).toUpperCase();
            avatares.forEach(av=>{
                if(appConfig.fotoPerfil){av.style.backgroundImage=`url(${appConfig.fotoPerfil})`; av.innerText="";}
                else {av.style.backgroundImage="none"; av.innerText=iniciais;}
            });

            // Atualiza mês
            document.getElementById('mesDisplay').innerText=dataVisualizacao.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase();
            const prefixoMes=`${dataVisualizacao.getFullYear()}-${String(dataVisualizacao.getMonth()+1).padStart(2,'0')}`;
            const corpo=document.getElementById('tabelaCorpo'); corpo.innerHTML='';

            let sRec=0, sGas=0;
            const registrosDoMes=registros.filter(r=>r.data.startsWith(prefixoMes));
            registrosDoMes.forEach(r=>{
                const v=parseFloat(r.valor);
                if(r.tipo==='Receita') sRec+=v; else sGas+=v;
                corpo.innerHTML+=`
                <div class="transaction-item" onclick="openModal(${registros.indexOf(r)})">
                    <div class="icon-box" style="color:${r.tipo==='Receita'?'var(--success)':'var(--warning)'}">
                        <i class="fa-solid ${r.tipo==='Receita'?'fa-arrow-up':'fa-arrow-down'}"></i>
                    </div>
                    <div style="flex:1"><strong>${r.desc}</strong><br><small style="color:var(--text-muted)">${r.data.split('-').reverse().join('/')}</small></div>
                    <div style="text-align:right"><strong>${formatarMoeda(v)}</strong></div>
                </div>`;
            });

            document.getElementById('totalReceitas').innerText=formatarMoeda(sRec);
            document.getElementById('totalGastos').innerText=formatarMoeda(sGas);
            document.getElementById('totalSaldo').innerText=formatarMoeda(sRec-sGas);
        }

        function formatarMoeda(valor){return modoFantasma?"R$ ••••":"R$ "+parseFloat(valor).toLocaleString('pt-BR',{minimumFractionDigits:2});}

        // 🔹 FUNÇÕES DE UI
        function toggleSidebar(){document.getElementById('profileSidebar').classList.toggle('open');document.getElementById('overlay').style.display=document.getElementById('profileSidebar').classList.contains('open')?'block':'none';}
        function openModal(idx=null){document.getElementById('modalForm').classList.add('open');document.getElementById('overlay').style.display='block';if(idx!==null){const r=registros[idx];document.getElementById('editIndex').value=idx;document.getElementById('tipo').value=r.tipo;document.getElementById('desc').value=r.desc;document.getElementById('valor').value=r.valor;document.getElementById('data').value=r.data;document.getElementById('btnExcluir').classList.remove('hidden');}else{resetForm();}}
        function closeAll(){document.getElementById('modalForm').classList.remove('open');document.getElementById('profileSidebar').classList.remove('open');document.getElementById('overlay').style.display='none';}
        function mudarMes(delta){dataVisualizacao.setMonth(dataVisualizacao.getMonth()+delta);renderizar();}
        function toggleFantasma(){modoFantasma=!modoFantasma;document.getElementById('eyeIcon').className=modoFantasma?'fa-solid fa-eye-slash':'fa-solid fa-eye';renderizar();}
        function resetForm(){document.getElementById('editIndex').value="";document.getElementById('desc').value="";document.getElementById('valor').value="";document.getElementById('data').value=new Date().toISOString().split('T')[0];document.getElementById('btnExcluir').classList.add('hidden');}
        function mudarTema(tema){document.documentElement.setAttribute('data-theme',tema);localStorage.setItem('meucaixa_theme',tema);closeAll();}
        function salvarConfig(){localStorage.setItem('meucaixa_config',JSON.stringify(appConfig));renderizar();}
        function mudarNome(){let n=prompt("Nome:");if(n){appConfig.nome=n;salvarConfig();}}

        window.onload=()=>{
            const t=localStorage.getItem('meucaixa_theme');
            if(t) document.documentElement.setAttribute('data-theme',t);
            renderizar();
        };
    </script>
</body>
</html>
