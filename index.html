<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gêneses Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030712; --card: #111827; --accent: #00f2ff; --text: #f3f4f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { padding: 15px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .balance-card { padding: 20px; text-align: center; }
        .month-selector { display: flex; justify-content: space-around; align-items: center; padding: 10px; background: #070b14; }
        .quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .mini-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #1f2937; }
        .transaction-item { background: var(--card); padding: 12px; border-radius: 12px; margin: 8px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #1f2937; }
        .details { flex: 1; }
        .amount { text-align: right; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 15px; background: var(--accent); border: none; font-size: 1.5rem; z-index: 20; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; transition: 0.3s; z-index: 30; overflow-y: auto; }
        .modal.open { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 25; }
        input, select { width: 100%; background: #1f2937; border: 1px solid #374151; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header onclick="toggleSidebar()">
    <div><small>PROTOCOLO FÓTON</small><br><strong>WENDEL CARNEIRO</strong></div>
    <i id="eyeIcon" class="fa-solid fa-eye" onclick="event.stopPropagation(); toggleFantasma()"></i>
</header>

<div class="month-selector">
    <button onclick="mudarMes(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <strong id="mesDisplay">Mês Ano</strong>
    <button onclick="mudarMes(1)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<div class="balance-card">
    <small>SALDO DO MÊS</small>
    <h1 id="totalSaldo">R$ 0,00</h1>
</div>

<div class="quick-stats">
    <div class="mini-card" onclick="setFiltro('Receita')"><span>Entradas</span><br><strong id="totalReceitas">R$ 0,00</strong></div>
    <div class="mini-card" onclick="setFiltro('Gasto')"><span>Gastos</span><br><strong id="totalGastos">R$ 0,00</strong></div>
    <div class="mini-card" onclick="setFiltro('Divida')"><span>Dívidas</span><br><strong id="totalDividas">R$ 0,00</strong></div>
    <div class="mini-card" onclick="setFiltro('Reserva')"><span>Patrimônio</span><br><strong id="totalReserva">R$ 0,00</strong></div>
</div>

<main id="tabelaCorpo"></main>

<button class="fab" onclick="openModal()"><i class="fa-solid fa-plus"></i></button>
<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="modal" id="modalForm">
    <h2 id="modalTitle">Nova Operação</h2>
    <select id="tipo" onchange="toggleParcelas()">
        <option value="Receita">Receita</option>
        <option value="Fixo">Gasto Fixo</option>
        <option value="Variavel">Variável</option>
        <option value="Divida">Dívida / Boleto</option>
        <option value="Reserva">Patrimônio</option>
    </select>
    <input type="text" id="desc" placeholder="Descrição">
    <input type="number" id="valor" placeholder="Valor Total" step="0.01">
    
    <div id="blocoDivida" class="hidden">
        <label><small>Parcelar em quantas vezes?</small></label>
        <input type="number" id="parcelas" value="1">
        <label><small>Quantas parcelas já pagou?</small></label>
        <input type="number" id="parcelasPagas" value="0">
    </div>

    <input type="date" id="data">
    <input type="hidden" id="editIdx">
    <button class="btn-save" onclick="salvar()">SALVAR</button>
    <button id="btnDel" class="hidden" onclick="excluir()" style="width:100%; margin-top:10px; background:none; border:1px solid var(--danger); color:var(--danger); padding:10px; border-radius:10px;">EXCLUIR</button>
</div>

<script>
    let registros = JSON.parse(localStorage.getItem('foton_db')) || [];
    let dataVis = new Date();
    let modoF = false, filtro = "Tudo";

    function toggleParcelas() {
        document.getElementById('blocoDivida').classList.toggle('hidden', document.getElementById('tipo').value !== 'Divida');
    }

    function salvar() {
        const t = document.getElementById('tipo').value, d = document.getElementById('desc').value;
        const v = parseFloat(document.getElementById('valor').value), dt = document.getElementById('data').value;
        const p = parseInt(document.getElementById('parcelas').value) || 1, pp = parseInt(document.getElementById('parcelasPagas').value) || 0;
        const idx = document.getElementById('editIdx').value;

        if(!d || !v || !dt) return alert("Preencha tudo!");

        if(idx !== "") {
            registros[idx] = { t, d, v, dt, p: 1, pp: 0 };
        } else if(t === 'Divida' && p > 1) {
            const vP = v / p;
            let dObj = new Date(dt + "T12:00:00");
            for(let i=1; i<=p; i++) {
                let nD = new Date(dObj.getFullYear(), dObj.getMonth()+(i-1), dObj.getDate()).toISOString().split('T')[0];
                registros.push({ t, d: `${d} (${i}/${p})`, v: vP, dt: nD, pago: (i <= pp) });
            }
        } else {
            registros.push({ t, d, v, dt, pago: (t==='Receita' || t==='Reserva') });
        }
        localStorage.setItem('foton_db', JSON.stringify(registros));
        closeModal(); renderizar();
    }

    function renderizar() {
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        document.getElementById('mesDisplay').innerText = `${meses[dataVis.getMonth()]} ${dataVis.getFullYear()}`;
        const prefix = `${dataVis.getFullYear()}-${String(dataVis.getMonth()+1).padStart(2,'0')}`;
        
        const corpo = document.getElementById('tabelaCorpo'); corpo.innerHTML = '';
        let sRec=0, sGas=0, sDiv=0, sRes=0;

        registros.sort((a,b) => new Date(b.dt) - new Date(a.dt)).forEach((r, idx) => {
            const v = parseFloat(r.v);
            if(r.dt.startsWith(prefix)) {
                if(r.t==='Receita') sRec+=v; else if(r.t==='Divida') sDiv+=(r.pago?0:v); else if(r.t==='Reserva') sRes+=v; else sGas+=v;
                
                if(filtro === "Tudo" || filtro === r.t || (filtro === "Gasto" && (r.t==='Fixo'||r.t==='Variavel'))) {
                    corpo.innerHTML += `<div class="transaction-item" onclick="openModal(${registros.indexOf(r)})">
                        <div class="details"><strong>${r.d}</strong><br><small>${r.dt.split('-').reverse().join('/')}</small></div>
                        <div class="amount"><strong>${modoF?'R$ •••':v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</strong><br>
                        <small style="color:${r.pago? 'var(--success)':'var(--danger)'}">${r.pago?'PAGO':'PENDENTE'}</small></div>
                    </div>`;
                }
            }
        });
        document.getElementById('totalReceitas').innerText = sRec.toLocaleString('pt-BR');
        document.getElementById('totalGastos').innerText = sGas.toLocaleString('pt-BR');
        document.getElementById('totalDividas').innerText = sDiv.toLocaleString('pt-BR');
        document.getElementById('totalReserva').innerText = sRes.toLocaleString('pt-BR');
        document.getElementById('totalSaldo').innerText = (sRec - (sGas + sDiv)).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    }

    function mudarMes(n) { dataVis.setMonth(dataVis.getMonth() + n); renderizar(); }
    function openModal(idx=null) {
        document.getElementById('modalForm').classList.add('open');
        document.getElementById('overlay').style.display='block';
        if(idx!==null) {
            const r = registros[idx];
            document.getElementById('editIdx').value = idx;
            document.getElementById('desc').value = r.d;
            document.getElementById('valor').value = r.v;
            document.getElementById('tipo').value = r.t;
            document.getElementById('data').value = r.dt;
            document.getElementById('btnDel').classList.remove('hidden');
        } else {
            document.getElementById('editIdx').value = "";
            document.getElementById('btnDel').classList.add('hidden');
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
        }
    }
    function closeModal() { document.getElementById('modalForm').classList.remove('open'); document.getElementById('overlay').style.display='none'; }
    function excluir() { registros.splice(document.getElementById('editIdx').value, 1); localStorage.setItem('foton_db', JSON.stringify(registros)); closeModal(); renderizar(); }
    function toggleFantasma() { modoF = !modoF; renderizar(); }
    window.onload = renderizar;
</script>
</body>
</html>
