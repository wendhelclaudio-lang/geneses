<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuCaixa - Comando de Ativos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a192f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        /* VARIÁVEIS DE TEMAS */
        :root {
            --bg: #030712; --card: #111827; --accent: #00f2ff; --text: #f3f4f6;
            --text-muted: #94a3b8; --border: #1f2937; --input-bg: #1f2937;
            --hover-bg: rgba(255,255,255,0.05); --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --reserve: #8b5cf6;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --accent: #0284c7; --text: #0f172a;
            --text-muted: #64748b; --border: #e2e8f0; --input-bg: #f1f5f9;
            --hover-bg: rgba(0,0,0,0.05); --success: #059669; --danger: #dc2626;
            --warning: #d97706; --reserve: #7c3aed;
        }
        [data-theme="nubank"] { --bg: #f0f1f5; --card: #ffffff; --accent: #820ad1; --text: #111111; --text-muted: #757575; --border: #e0e0e0; --input-bg: #f5f5f5; --hover-bg: rgba(130, 10, 209, 0.05); --success: #00a868; --danger: #e92929; --warning: #ff9800; --reserve: #820ad1; }
        [data-theme="santander"] { --bg: #f5f5f5; --card: #ffffff; --accent: #ec0000; --text: #222222; --text-muted: #666666; --border: #cccccc; --input-bg: #eeeeee; --hover-bg: rgba(236, 0, 0, 0.05); --success: #107c10; --danger: #cc0000; --warning: #ff7300; --reserve: #444444; }
        [data-theme="itau"] { --bg: #f0f1f3; --card: #ffffff; --accent: #ec7000; --text: #002959; --text-muted: #6c7a89; --border: #dcdde1; --input-bg: #f5f6f8; --hover-bg: rgba(236, 112, 0, 0.05); --success: #008f39; --danger: #da291c; --warning: #ec7000; --reserve: #002959; }
        [data-theme="bradesco"] { --bg: #ffffff; --card: #f9f9f9; --accent: #cc092f; --text: #333333; --text-muted: #777777; --border: #e6e6e6; --input-bg: #ffffff; --hover-bg: rgba(204, 9, 47, 0.05); --success: #008000; --danger: #cc092f; --warning: #f2a900; --reserve: #444444; }

        * { box-sizing: border-box; outline: none; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { font-family: 'Ubuntu', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; font-size: 0.95rem; }

        /* TELA DE BLOQUEIO / LOGIN (CENA DE ENTRADA) */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--bg) 0%, var(--card) 100%); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; transition: opacity 0.6s ease, visibility 0.6s; }
        
        .login-logo { font-size: 4.5rem; color: var(--accent); margin-bottom: 10px; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.3)); }
        .lock-title { font-size: 2rem; margin-bottom: 5px; color: var(--text); font-weight: 800; text-align: center; letter-spacing: 1px;}
        .lock-subtitle { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 40px; text-align: center;}
        
        .btn-google { width: 100%; max-width: 320px; background: #ffffff; color: #444; border: 1px solid #ddd; padding: 16px; border-radius: 16px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; transition: transform 0.2s;}
        .btn-google:active { transform: scale(0.97); }
        .btn-google img { width: 22px; height: 22px; }

        .btn-guest { width: 100%; max-width: 320px; background: transparent; color: var(--text); border: 2px solid var(--border); padding: 16px; border-radius: 16px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s;}
        .btn-guest:active { background: var(--hover-bg); }

        /* TOAST NOTIFICATION */
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 350px;}
        .toast { background: var(--card); color: var(--text); padding: 16px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 15px; font-weight: 500; font-size: 0.9rem; animation: slideUp 0.3s ease forwards; border-left: 5px solid var(--accent); }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        header { background: var(--bg); padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .profile-section { display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), #0a192f); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ffffff; border: 2px solid var(--border); font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; background-size: cover; background-position: center; }
        .user-info span { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .user-info strong { font-size: 0.95rem; color: var(--text); letter-spacing: 0.5px;}

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 380px; height: 100%; background: var(--card); z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 24px; border-left: 1px solid var(--accent); box-shadow: -15px 0 40px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar.open { right: 0; }
        .sidebar-header { margin-bottom: 25px; text-align: center; position: relative; }
        
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; flex: 1; padding-bottom: 20px;}
        .menu-item { padding: 14px 18px; border-radius: 12px; background: var(--hover-bg); display: flex; align-items: center; justify-content: space-between; gap: 15px; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; color: var(--text); font-weight: 500;}
        .menu-item:active { background: var(--border); transform: scale(0.98); }
        .menu-item i { color: var(--accent); font-size: 1.1rem; width: 25px; text-align: center; }

        /* OUTROS ESTILOS (RESUMIDOS PARA O EXEMPLO) */
        .balance-card { padding: 18px 22px 25px; text-align: center; }
        .balance-card h1 { font-size: 2.5rem; margin: 8px 0 0; font-weight: 800; color: var(--text); }
        .mini-card { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .mini-card strong { display: block; font-size: 0.95rem; margin-top: 5px; }
        .month-selector { display: flex; justify-content: space-between; align-items: center; padding: 22px; }
        .fab { position: fixed; bottom: 30px; right: 22px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 92%; background: var(--card); border-radius: 35px 35px 0 0; z-index: 2000; padding: 25px; transition: 0.4s; overflow-y: auto; }
        .modal.open { bottom: 0; }
        .theme-selector { background: var(--bg); padding: 10px; border-radius: 10px; display: none; flex-direction: column; gap: 5px; margin-top: 5px; }
        .theme-selector.open { display: flex; }
        .theme-btn { padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; text-align: center; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="lock-screen">
        <i class="fa-solid fa-coins login-logo"></i>
        <h2 class="lock-title">MeuCaixa</h2>
        <p class="lock-subtitle">Gerencie suas finanças com inteligência.</p>
        
        <button class="btn-google" onclick="iniciarLoginGoogle()" id="btnGoogleAuth">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar com Google
        </button>
        
        <button class="btn-guest" onclick="continuarSemLogin()">
            Continuar sem login
        </button>
    </div>

    <header>
        <div class="profile-section" onclick="toggleSidebar()">
            <div class="avatar" id="headerAvatar">WC</div>
            <div class="user-info">
                <span>MEUCAIXA</span>
                <strong id="headerUserName">CARREGANDO...</strong>
            </div>
        </div>
        <button onclick="toggleFantasma()" style="background:none; border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:10px; cursor:pointer;">
            <i id="eyeIcon" class="fa-solid fa-eye"></i>
        </button>
    </header>

    <div class="sidebar" id="profileSidebar">
        <div style="text-align: right; margin-bottom: 15px;"><i class="fa-solid fa-xmark" style="font-size: 1.4rem; cursor: pointer; color: var(--text-muted);" onclick="toggleSidebar()"></i></div>
        <div class="sidebar-header">
            <div class="avatar" id="sidebarAvatar" style="width: 70px; height: 70px; font-size: 2rem; margin: 0 auto 12px;">WC</div>
            <h2 style="margin:0; font-size: 1.15rem; color: var(--text);" id="sidebarUserName">USUÁRIO</h2>
            <span id="statusConexao" style="color: var(--accent); font-size: 0.75rem;">OFFLINE</span>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-item" onclick="mudarNome()">
                <div><i class="fa-solid fa-user-pen"></i> <span>Mudar Nome Local</span></div>
            </div>
            
            <div class="menu-item" onclick="document.getElementById('themeOptions').classList.toggle('open')">
                <div><i class="fa-solid fa-palette"></i> <span>Aparência / Banco</span></div>
                <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem; width: auto;"></i>
            </div>
            <div class="theme-selector" id="themeOptions">
                <div class="theme-btn" onclick="mudarTema('dark')">Escuro (Padrão)</div>
                <div class="theme-btn" onclick="mudarTema('light')">Claro</div>
                <div class="theme-btn" onclick="mudarTema('nubank')">Nubank</div>
                <div class="theme-btn" onclick="mudarTema('itau')">Itaú</div>
            </div>

            <div class="menu-item" onclick="exportarDados()">
                <div><i class="fa-solid fa-file-export"></i> <span>Exportar Relatório</span></div>
            </div>

            <div class="menu-item" style="border-color: rgba(239, 68, 68, 0.2); margin-top: 20px;" onclick="fazerLogout()">
                <div><i class="fa-solid fa-right-from-bracket" style="color: var(--danger);"></i> <span style="color: var(--danger);">Sair da Conta</span></div>
            </div>
        </div>
    </div>

    <div class="month-selector">
        <button onclick="mudarMes(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="mesDisplay">Mês Ano</span>
        <button onclick="mudarMes(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="balance-card">
        <small style="color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Saldo Disponível</small>
        <h1 id="totalSaldo">R$ 0,00</h1>
    </div>

    <div class="quick-stats">
        <div class="mini-card" onclick="filtrarExtrato('Receita')"><i class="fa-solid fa-arrow-up" style="color:var(--success)"></i><span>Entradas</span><strong id="totalReceitas">R$ 0,00</strong></div>
        <div class="mini-card" onclick="filtrarExtrato('Gasto')"><i class="fa-solid fa-arrow-down" style="color:var(--warning)"></i><span>Gastos</span><strong id="totalGastos">R$ 0,00</strong></div>
    </div>

    <main id="tabelaCorpo"></main>

    <button class="fab" onclick="openModal()"><i class="fa-solid fa-plus"></i></button>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="modal" id="modalForm">
        <h2 id="modalTitle" style="margin-top:0">Nova Operação</h2>
        <select id="tipo">
            <option value="Receita">Receita</option>
            <option value="Fixo">Gasto Fixo</option>
            <option value="Variavel">Gasto Variável</option>
        </select>
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="valor" placeholder="0,00" step="0.01">
        <input type="date" id="data">
        <input type="hidden" id="editIndex">
        <button class="btn-confirm" onclick="salvar()">SALVAR OPERAÇÃO</button>
        <button id="btnExcluir" class="btn-delete hidden" onclick="excluirRegistro()">EXCLUIR</button>
    </div>

    <script>
        // CONFIGURAÇÃO REAL DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD2TXAC0o5t8vTsH2jzLqZ9QoReHU5y0Mo",
            authDomain: "meucaixa-d8d24.firebaseapp.com",
            projectId: "meucaixa-d8d24",
            storageBucket: "meucaixa-d8d24.firebasestorage.app",
            messagingSenderId: "486750418195",
            appId: "1:486750418195:web:4c33081663486abda796e6"
        };

        // INICIALIZANDO FIREBASE
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let registros = JSON.parse(localStorage.getItem('foton_db')) || [];
        let modoFantasma = false, dataVisualizacao = new Date();
        
        let savedConfig = JSON.parse(localStorage.getItem('meucaixa_config')) || {};
        let appConfig = {
            nome: savedConfig.nome || "WENDEL CARNEIRO",
            moeda: savedConfig.moeda || "R$",
            fotoPerfil: savedConfig.fotoPerfil || null
        };

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? '<i class="fa-solid fa-check-circle" style="color: var(--success)"></i>' : '<i class="fa-solid fa-triangle-exclamation" style="color: var(--danger)"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ==========================================
        // SISTEMA DE LOGIN GOOGLE & CONVIDADO
        // ==========================================
        
        // Verifica automaticamente se o usuário já está logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Usuário logado com Google
                appConfig.nome = user.displayName;
                appConfig.fotoPerfil = user.photoURL;
                document.getElementById('statusConexao').innerText = "GOOGLE CLOUD";
                document.getElementById('statusConexao').style.color = "#0ea5e9";
                salvarConfig();
                
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('lock-screen').classList.add('hidden'); }, 500);
            } else {
                // Se não estiver logado no Google, verifica se clicou em "Continuar sem Login" nesta sessão
                if(sessionStorage.getItem('guestMode') === 'true') {
                    document.getElementById('statusConexao').innerText = "OFFLINE LOCAL";
                    document.getElementById('lock-screen').classList.add('hidden');
                } else {
                    document.getElementById('lock-screen').classList.remove('hidden');
                    document.getElementById('lock-screen').style.opacity = '1';
                }
            }
        });

        function iniciarLoginGoogle() {
            auth.signInWithPopup(provider).then((result) => {
                showToast(`Bem-vindo, ${result.user.displayName.split(" ")[0]}!`, "success");
            }).catch((error) => {
                showToast("Erro ao conectar com Google", "error");
                console.error(error);
            });
        }

        function continuarSemLogin() {
            sessionStorage.setItem('guestMode', 'true');
            document.getElementById('statusConexao').innerText = "OFFLINE LOCAL";
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('lock-screen').classList.add('hidden'); }, 500);
            showToast("Entrou no Modo Offline", "success");
            renderizar();
        }

        function fazerLogout() {
            auth.signOut().then(() => {
                sessionStorage.removeItem('guestMode');
                closeAll();
                location.reload(); // Recarrega para voltar à tela de login
            });
        }

        // ==========================================
        // LÓGICA PRINCIPAL DO APP
        // ==========================================

        function carregarConfig() {
            document.getElementById('headerUserName').innerText = appConfig.nome;
            document.getElementById('sidebarUserName').innerText = appConfig.nome;
            
            // Atualiza Avatares (Netflix Style)
            let avatares = [document.getElementById('headerAvatar'), document.getElementById('sidebarAvatar')];
            let iniciais = appConfig.nome.substring(0, 2).toUpperCase();
            
            avatares.forEach(av => {
                if (appConfig.fotoPerfil) {
                    av.style.backgroundImage = `url(${appConfig.fotoPerfil})`;
                    av.innerText = "";
                } else {
                    av.style.backgroundImage = "none";
                    av.innerText = iniciais;
                }
            });
        }

        function renderizar() {
            carregarConfig();
            document.getElementById('mesDisplay').innerText = dataVisualizacao.toLocaleDateString('pt-BR', {month: 'long', year: 'numeric'}).toUpperCase();
            const prefixoMes = `${dataVisualizacao.getFullYear()}-${String(dataVisualizacao.getMonth() + 1).padStart(2, '0')}`;
            const corpo = document.getElementById('tabelaCorpo'); corpo.innerHTML = '';
            
            let sRec=0, sGas=0;
            const registrosDoMes = registros.filter(r => r.data.startsWith(prefixoMes));

            registrosDoMes.forEach(r => {
                const v = parseFloat(r.valor);
                if(r.tipo === 'Receita') sRec += v; else sGas += v;

                corpo.innerHTML += `
                    <div class="transaction-item" onclick="openModal(${registros.indexOf(r)})">
                        <div class="icon-box" style="color: ${r.tipo === 'Receita' ? 'var(--success)' : 'var(--warning)'}">
                            <i class="fa-solid ${r.tipo === 'Receita' ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                        </div>
                        <div style="flex:1">
                            <strong>${r.desc}</strong><br>
                            <small style="color:var(--text-muted)">${r.data.split('-').reverse().join('/')}</small>
                        </div>
                        <div style="text-align:right">
                            <strong>${formatarMoeda(v)}</strong>
                        </div>
                    </div>`;
            });

            document.getElementById('totalReceitas').innerText = formatarMoeda(sRec);
            document.getElementById('totalGastos').innerText = formatarMoeda(sGas);
            document.getElementById('totalSaldo').innerText = formatarMoeda(sRec - sGas);
        }

        function salvar() {
            const t = document.getElementById('tipo').value, d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data').value, idx = document.getElementById('editIndex').value;
            if(!d || !v || !dt) return showToast("Preencha todos os campos!", "error");
            
            const novo = { tipo: t, desc: d, valor: v, data: dt };
            if(idx !== "") registros[idx] = novo; else registros.push(novo);
            
            localStorage.setItem('foton_db', JSON.stringify(registros));
            closeAll(); renderizar(); showToast("Operação Salva!");
        }

        function formatarMoeda(valor) {
            if(modoFantasma) return "R$ ••••";
            return "R$ " + parseFloat(valor).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }

        // Funções de UI
        function toggleSidebar() { document.getElementById('profileSidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('profileSidebar').classList.contains('open') ? 'block' : 'none'; }
        function openModal(idx = null) {
            document.getElementById('modalForm').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            if(idx !== null) {
                const r = registros[idx];
                document.getElementById('editIndex').value = idx;
                document.getElementById('tipo').value = r.tipo;
                document.getElementById('desc').value = r.desc;
                document.getElementById('valor').value = r.valor;
                document.getElementById('data').value = r.data;
                document.getElementById('btnExcluir').classList.remove('hidden');
            } else {
                resetForm();
            }
        }
        function closeAll() { document.getElementById('modalForm').classList.remove('open'); document.getElementById('profileSidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
        function mudarMes(delta) { dataVisualizacao.setMonth(dataVisualizacao.getMonth() + delta); renderizar(); }
        function toggleFantasma() { modoFantasma = !modoFantasma; document.getElementById('eyeIcon').className = modoFantasma ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'; renderizar(); }
        function resetForm() { document.getElementById('editIndex').value = ""; document.getElementById('desc').value = ""; document.getElementById('valor').value = ""; document.getElementById('data').value = new Date().toISOString().split('T')[0]; document.getElementById('btnExcluir').classList.add('hidden'); }
        function mudarTema(tema) { document.documentElement.setAttribute('data-theme', tema); localStorage.setItem('meucaixa_theme', tema); closeAll(); }
        function salvarConfig() { localStorage.setItem('meucaixa_config', JSON.stringify(appConfig)); carregarConfig(); }
        function mudarNome() { let n = prompt("Nome:"); if(n) { appConfig.nome = n; salvarConfig(); } }

        window.onload = () => { 
            const t = localStorage.getItem('meucaixa_theme');
            if(t) document.documentElement.setAttribute('data-theme', t);
            renderizar(); 
        };
    </script>
</body>
</html>
