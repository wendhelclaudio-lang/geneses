<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuCaixa - Comando de Ativos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root { --bg: #030712; --card: #111827; --accent: #00f2ff; --text: #f3f4f6; --text-muted: #94a3b8; --border: #1f2937; }
        body { font-family: 'Ubuntu', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #lock-screen { text-align: center; padding: 30px; width: 100%; max-width: 400px; transition: opacity 0.5s; }
        .login-logo { font-size: 4rem; color: var(--accent); margin-bottom: 20px; }
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 15px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-google { background: #fff; color: #444; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-guest { background: transparent; color: #fff; border: 2px solid var(--border); }
        .hidden { display: none !important; }
        #main-app { padding: 40px; text-align: center; }
        .user-photo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <i class="fa-solid fa-coins login-logo"></i>
        <h2 style="margin-bottom:5px; font-size: 2rem;">MeuCaixa</h2>
        <p style="color:var(--text-muted); margin-bottom:40px;">Seu controle financeiro na nuvem.</p>
        
        <button class="btn btn-google" onclick="loginGoogle()" id="btnG">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> 
            Entrar com Google
        </button>
        
        <button class="btn btn-guest" onclick="entrarOffline()">Continuar Offline</button>
    </div>

    <div id="main-app" class="hidden">
        <img id="uFoto" class="user-photo" src="">
        <h1 style="font-size: 1.5rem;">Olá, <span id="uNome"></span>!</h1>
        <p style="color: var(--text-muted);">Seu acesso está liberado.</p>
        <br>
        <button class="btn btn-guest" onclick="logout()" style="max-width: 200px; margin: 0 auto;">Sair do App</button>
    </div>

    <script>
        // CONFIGURAÇÃO EXTRAÍDA DA SUA FOTO (CHAVE REAL AQUI)
        const firebaseConfig = {
            apiKey: "AIzaSyD2TXAC0o5t8vTsH2jzLqZ9QoReHU5y0Mo",
            authDomain: "meucaixa-d8d24.firebaseapp.com",
            projectId: "meucaixa-d8d24",
            storageBucket: "meucaixa-d8d24.firebasestorage.app",
            messagingSenderId: "486750418195",
            appId: "1:486750418195:web:4c33081663486abda796e6"
        };

        // Inicia o Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // Função de Login (Modo Redirecionamento para PWAs)
        function loginGoogle() {
            document.getElementById('btnG').innerText = "Redirecionando...";
            auth.signInWithRedirect(provider);
        }

        // Verifica o resultado quando volta da página do Google
        auth.getRedirectResult().then((result) => {
            if (result.user) { 
                abrirPainel(result.user); 
            }
        }).catch((e) => {
            console.error(e);
            if(e.code === "auth/api-key-not-valid") {
                alert("Erro: A chave de API ainda parece inválida. Verifique o Passo 1.");
            } else {
                alert("Erro no Login: " + e.message);
            }
        });

        // Mantém o usuário logado se ele atualizar a página
        auth.onAuthStateChanged((user) => {
            if (user) {
                abrirPainel(user);
            }
        });

        function abrirPainel(user) {
            document.getElementById('uNome').innerText = user.displayName;
            document.getElementById('uFoto').src = user.photoURL;
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            sessionStorage.setItem('isLoggedIn', 'true');
        }

        function entrarOffline() {
            alert("Modo Offline ativado.");
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('uNome').innerText = "Visitante";
        }

        function logout() {
            auth.signOut().then(() => {
                sessionStorage.removeItem('isLoggedIn');
                location.reload();
            });
        }
    </script>
</body>
</html>
