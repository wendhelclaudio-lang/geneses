<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gêneses Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a192f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #00f2ff;
            --text: #f3f4f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* Top Bar Fixa */
        header {
            background: var(--bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-info span { font-size: 0.7rem; color: #94a3b8; letter-spacing: 1px; }
        .user-info strong { font-size: 0.9rem; color: var(--accent); }

        /* Dashboard de Saldo */
        .balance-card {
            padding: 25px 20px;
            text-align: center;
        }
        .balance-card small { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .balance-card h1 { font-size: 2.2rem; margin: 10px 0; font-weight: 800; }

        /* Grid de Status (Mini Cards) */
        .quick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 20px 20px;
        }
        .mini-card {
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .mini-card i { font-size: 0.8rem; margin-bottom: 5px; }
        .mini-card span { display: block; font-size: 0.65rem; color: #94a3b8; }
        .mini-card strong { font-size: 0.9rem; }

        /* Container Principal com Scroll */
        main { padding: 0 20px 100px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }
        .section-header h3 { font-size: 0.9rem; margin: 0; color: #94a3b8; text-transform: uppercase; }

        /* Lista Estilo Mobile */
        .transaction-item {
            background: var(--card);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }
        .transaction-item:active { transform: scale(0.98); background: #1f2937; }
        
        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f2937;
        }

        .details { flex: 1; }
        .details strong { display: block; font-size: 0.9rem; margin-bottom: 2px; }
        .details span { font-size: 0.7rem; color: #6b7280; }

        .amount { text-align: right; }
        .amount strong { display: block; font-size: 0.9rem; }
        .amount small { font-size: 0.6rem; font-weight: 800; }

        /* Botão Flutuante (Add) */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--accent);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
            border: none;
            z-index: 1000;
        }

        /* Modal de Inserção */
        .modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 90%;
            background: var(--card);
            border-radius: 30px 30px 0 0;
            z-index: 2000;
            padding: 30px 20px;
            box-sizing: border-box;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .modal.open { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        input, select {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            padding: 15px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .btn-confirm {
            background: var(--accent);
            color: var(--bg);
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 10px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <span>PROTOCOLO FÓTON</span>
            <strong>W. C. R. CARNEIRO</strong>
        </div>
        <button id="btnFantasma" onclick="toggleFantasma()" style="background:none; border:1px solid #1f2937; color:white; padding:8px; border-radius:10px;">
            <i id="eyeIcon" class="fa-solid fa-eye"></i>
        </button>
    </header>

    <div class="balance-card">
        <small>Saldo Disponível</small>
        <h1 id="totalSaldo">R$ 0,00</h1>
    </div>

    <div class="quick-stats">
        <div class="mini-card">
            <i class="fa-solid fa-arrow-up" style="color:var(--success)"></i>
            <span>Receitas</span>
            <strong id="totalReceitas">R$ 0,00</strong>
        </div>
        <div class="mini-card">
            <i class="fa-solid fa-arrow-down" style="color:var(--warning)"></i>
            <span>Saídas</span>
            <strong id="totalGastos">R$ 0,00</strong>
        </div>
        <div class="mini-card">
            <i class="fa-solid fa-barcode" style="color:var(--danger)"></i>
            <span>Dívidas</span>
            <strong id="totalDividas">R$ 0,00</strong>
        </div>
        <div class="mini-card">
            <i class="fa-solid fa-vault" style="color:var(--reserve)"></i>
            <span>Patrimônio</span>
            <strong id="totalReserva">R$ 0,00</strong>
        </div>
    </div>

    <main>
        <div class="section-header">
            <h3>Atividade Recente</h3>
            <i class="fa-solid fa-sliders"></i>
        </div>
        <div id="tabelaCorpo">
            </div>
    </main>

    <button class="fab" onclick="openModal()">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>

    <div class="modal" id="modalForm">
        <div class="modal-header">
            <h2 style="margin:0; font-size:1.2rem;">Nova Operação</h2>
            <i class="fa-solid fa-xmark" onclick="closeModal()"></i>
        </div>
        
        <label style="font-size:0.7rem; color:var(--accent)">CATEGORIA</label>
        <select id="tipo" onchange="atualizarSubmenu()">
            <option value="Receita">Receita</option>
            <option value="Fixo">Gasto Fixo</option>
            <option value="Variavel">Gasto Variável</option>
            <option value="Divida">Dívida / Boleto</option>
            <option value="Reserva">Patrimônio</option>
        </select>

        <select id="submenu" onchange="definirDescricao()"></select>
        
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="valor" placeholder="Valor R$" step="0.01" inputmode="decimal">
        
        <div id="campoPago" class="hidden">
            <input type="number" id="pago" placeholder="Quanto já pagou?" step="0.01" inputmode="decimal">
        </div>

        <input type="date" id="data">
        
        <input type="hidden" id="editIndex">
        <button class="btn-confirm" onclick="salvar()">CONFIRMAR</button>
    </div>

    <script>
        let registros = JSON.parse(localStorage.getItem('foton_db')) || [];
        let modoFantasma = false;

        const opcoesSubmenu = {
            "Receita": ["💰 Salário", "🚀 Freelance", "📈 Rendimentos", "✨ Outros"],
            "Fixo": ["🏠 Aluguel", "⚡ Energia", "💧 Água", "🌐 Internet", "🎬 Streamings"],
            "Variavel": ["🛒 Mercado", "🍕 Alimentação", "⛽ Combustível", "🚗 Uber"],
            "Divida": ["💳 Cartão de Crédito", "🤝 Empréstimo", "🧾 Boleto"],
            "Reserva": ["₿ Cripto", "📊 Investimentos", "📦 Caixinha"]
        };

        function openModal() {
            document.getElementById('modalForm').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('editIndex').value = "";
        }

        function closeModal() {
            document.getElementById('modalForm').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
            resetForm();
        }

        function atualizarSubmenu() {
            const tipo = document.getElementById('tipo').value;
            const sub = document.getElementById('submenu');
            sub.innerHTML = '';
            opcoesSubmenu[tipo].forEach(opt => {
                sub.innerHTML += `<option value="${opt}">${opt}</option>`;
            });
            document.getElementById('campoPago').classList.toggle('hidden', tipo === 'Receita' || tipo === 'Reserva');
            definirDescricao();
        }

        function definirDescricao() {
            const val = document.getElementById('submenu').value;
            document.getElementById('desc').value = val.split(' ').slice(1).join(' ');
        }

        function salvar() {
            const tipo = document.getElementById('tipo').value;
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value) || 0;
            const data = document.getElementById('data').value;
            let pago = parseFloat(document.getElementById('pago').value) || 0;
            const editIdx = document.getElementById('editIndex').value;

            if(!desc || valor <= 0 || !data) return alert("Preencha tudo!");
            if(tipo === 'Receita' || tipo === 'Reserva') pago = valor;

            const obj = { tipo, desc, valor, pago, data };
            if(editIdx === "") registros.push(obj);
            else registros[editIdx] = obj;

            localStorage.setItem('foton_db', JSON.stringify(registros));
            closeModal();
            renderizar();
        }

        function renderizar() {
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = '';
            let sRec = 0, sGas = 0, sDiv = 0, sRes = 0;

            const ordenados = [...registros].sort((a, b) => new Date(b.data) - new Date(a.data));

            ordenados.forEach((r, originalIdx) => {
                const i = registros.indexOf(r);
                const vTotal = parseFloat(r.valor), vPago = parseFloat(r.pago), falta = vTotal - vPago;
                let icon = 'fa-receipt', color = '#00f2ff';

                if(r.tipo === 'Receita') { sRec += vTotal; icon='fa-arrow-up-long'; color='#10b981'; }
                else if(r.tipo === 'Divida') { sDiv += falta; icon='fa-barcode'; color='#ef4444'; }
                else if(r.tipo === 'Reserva') { sRes += vTotal; icon='fa-vault'; color='#8b5cf6'; }
                else { sGas += vTotal; icon='fa-cart-shopping'; color='#f59e0b'; }

                corpo.innerHTML += `
                    <div class="transaction-item" onclick="editar(${i})">
                        <div class="icon-box" style="color:${color}"><i class="fa-solid ${icon}"></i></div>
                        <div class="details">
                            <strong>${r.desc}</strong>
                            <span>${r.data.split('-').reverse().join('/')}</span>
                        </div>
                        <div class="amount">
                            <strong style="color:${r.tipo === 'Receita' ? '#10b981' : 'white'}">${ocultarBits(vTotal)}</strong>
                            <small style="color:${vPago >= vTotal ? '#10b981' : '#ef4444'}">${vPago >= vTotal ? 'PAGO' : 'PENDENTE'}</small>
                        </div>
                    </div>`;
            });

            document.getElementById('totalReceitas').innerText = ocultarBits(sRec);
            document.getElementById('totalGastos').innerText = ocultarBits(sGas);
            document.getElementById('totalDividas').innerText = ocultarBits(sDiv);
            document.getElementById('totalReserva').innerText = ocultarBits(sRes);
            document.getElementById('totalSaldo').innerText = ocultarBits(sRec - (sGas + sDiv));
        }

        function editar(idx) {
            const r = registros[idx];
            document.getElementById('editIndex').value = idx;
            document.getElementById('tipo').value = r.tipo;
            atualizarSubmenu();
            document.getElementById('desc').value = r.desc;
            document.getElementById('valor').value = r.valor;
            document.getElementById('pago').value = r.pago;
            document.getElementById('data').value = r.data;
            openModal();
        }

        function toggleFantasma() {
            modoFantasma = !modoFantasma;
            document.getElementById('eyeIcon').className = modoFantasma ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            renderizar();
        }

        function ocultarBits(v) {
            return modoFantasma ? "R$ ••••" : "R$ " + v.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }

        function resetForm() {
            document.getElementById('valor').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('data').value = "";
        }

        window.onload = () => { atualizarSubmenu(); renderizar(); };
    </script>
</body>
</html>
