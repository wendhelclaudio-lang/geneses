<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuCaixa - Comando de Ativos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a192f">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root { --bg: #030712; --card: #111827; --accent: #00f2ff; --text: #f3f4f6; --text-muted: #94a3b8; --border: #1f2937; }
        body { font-family: 'Ubuntu', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        #lock-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg), var(--card)); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; transition: opacity 0.5s; }
        .login-logo { font-size: 4rem; color: var(--accent); margin-bottom: 20px; }
        .btn { width: 100%; max-width: 320px; padding: 18px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 15px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-google { background: #fff; color: #444; }
        .btn-guest { background: transparent; color: #fff; border: 1px solid var(--border); }
        header { background: var(--bg); padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .avatar { width: 44px; height: 44px; border-radius: 14px; background: var(--accent); background-size: cover; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <i class="fa-solid fa-coins login-logo"></i>
        <h2 style="font-size:2rem; margin-bottom:5px;">MeuCaixa</h2>
        <p style="color:var(--text-muted); margin-bottom:40px;">Gerencie suas finanças na nuvem.</p>
        
        <button class="btn btn-google" onclick="loginGoogle()" id="btnG">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Entrar com Google
        </button>
        <button class="btn btn-guest" onclick="entrarOffline()">Continuar Offline</button>
    </div>

    <header id="appHeader" class="hidden">
        <div style="display:flex; align-items:center; gap:14px;">
            <div class="avatar" id="uFoto">WC</div>
            <div><span style="font-size:0.6rem; color:var(--text-muted); display:block;">MEUCAIXA</span><strong id="uNome">WENDEL</strong></div>
        </div>
        <button onclick="logout()" style="background:none; border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:10px; cursor:pointer;">SAIR</button>
    </header>

    <script>
        // CONFIGURAÇÃO EXTRAÍDA DO SEU PRINT - FIREBASE REAL
        const firebaseConfig = {
            apiKey: "AIzaSyD2TXAC0o5t8vTsH2jzLqZ9QoReHU5y0Mo",
            authDomain: "meucaixa-d8d24.firebaseapp.com",
            projectId: "meucaixa-d8d24",
            storageBucket: "meucaixa-d8d24.firebasestorage.app",
            messagingSenderId: "486750418195",
            appId: "1:486750418195:web:4c33081663486abda796e6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // MODO REDIRECT: Não abre janelas, por isso não trava no App instalado
        function loginGoogle() {
            document.getElementById('btnG').innerText = "Redirecionando...";
            auth.signInWithRedirect(provider);
        }

        // Lida com o retorno do Google
        auth.getRedirectResult().then((result) => {
            if (result.user) entrarApp(result.user);
        }).catch((e) => { 
            if(e.code !== "auth/api-key-not-valid") alert("Erro: " + e.message); 
        });

        // Mantém logado ao atualizar
        auth.onAuthStateChanged((user) => {
            if (user) entrarApp(user);
            else if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('appHeader').classList.remove('hidden');
            }
        });

        function entrarApp(user) {
            document.getElementById('uNome').innerText = user.displayName.toUpperCase();
            if(user.photoURL) {
                document.getElementById('uFoto').style.backgroundImage = `url(${user.photoURL})`;
                document.getElementById('uFoto').innerText = "";
            }
            sessionStorage.setItem('isLoggedIn', 'true');
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('appHeader').classList.remove('hidden');
        }

        function entrarOffline() {
            sessionStorage.setItem('isLoggedIn', 'true');
            location.reload();
        }

        function logout() {
            auth.signOut().then(() => {
                sessionStorage.removeItem('isLoggedIn');
                location.reload();
            });
        }
    </script>
</body>
</html>
